<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinya Modify Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h1 {
            color: #333;
        }
        #last-update {
            color: #666;
            font-size: 0.9em;
        }
        .form-section, .data-section {
            margin-bottom: 40px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .action-btn {
            padding: 5px 10px;
            margin-right: 5px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 3px;
        }
        .delete-btn {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Vinya 数据修改面板</h1>
            <p id="last-update"></p>
        </header>

        <section class="form-section">
            <h2>数据录入</h2>
            <form id="data-form">
                <div class="form-group">
                    <label for="username">用户名：</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="email">邮箱：</label>
                    <input type="text" id="email" required>
                </div>
                <div class="form-group">
                    <label for="age">年龄：</label>
                    <input type="number" id="age" min="0" max="120">
                </div>
                <div class="form-group">
                    <label for="gender">性别：</label>
                    <select id="gender">
                        <option value="male">男</option>
                        <option value="female">女</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <button type="submit">提交数据</button>
            </form>
        </section>

        <section class="data-section">
            <h2>当前数据</h2>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>年龄</th>
                        <th>性别</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- 数据将通过JS动态生成 -->
                </tbody>
            </table>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 更新时间显示
            updateTimestamp();
            
            // 表单提交处理
            document.getElementById('data-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const newData = {
                    id: Date.now(),
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    age: document.getElementById('age').value,
                    gender: document.getElementById('gender').value
                };
                
                addTableRow(newData);
                this.reset();
                updateTimestamp();
            });

            // 初始加载示例数据
            loadSampleData();

            function updateTimestamp() {
                document.getElementById('last-update').textContent = 
                    '最后更新: ' + new Date().toLocaleString();
            }

            function loadSampleData() {
                const sampleData = [
                    {id: 1, username: '示例用户1', email: 'user1@example.com', age: 25, gender: 'male'},
                    {id: 2, username: '示例用户2', email: 'user2@example.com', age: 30, gender: 'female'}
                ];
                
                sampleData.forEach(data => addTableRow(data));
            }

            function addTableRow(data) {
                const tbody = document.getElementById('table-body');
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td>${data.id}</td>
                    <td>${data.username}</td>
                    <td>${data.email}</td>
                    <td>${data.age}</td>
                    <td>${data.gender === 'male' ? '男' : data.gender === 'female' ? '女' : '其他'}</td>
                    <td>
                        <button class="action-btn" onclick="editRow(this)">编辑</button>
                        <button class="action-btn delete-btn" onclick="deleteRow(this)">删除</button>
                    </td>
                `;
                
                tbody.appendChild(row);
            }
